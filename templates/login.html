<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden – Nuvio</title>
    <link rel="icon" type="image/png" href="/media/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:      #c8a96e;
            --gold-dark: #b8994e;
            --navy:      #1a1a2e;
            --navy-mid:  #2d2d4e;
            --bg:        #eeebe4;
            --card-bg:   #ffffff;
            --text:      #2a2a2a;
            --text-mid:  #666;
            --border:    #e2ddd5;
            --radius:    8px;
            --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.07);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .login-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 380px;
            padding: 40px 36px 36px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo img {
            height: 40px;
            width: auto;
            margin-bottom: 10px;
        }

        .login-logo .name {
            font-family: 'Lora', Georgia, serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--navy);
            display: block;
        }

        .login-logo .sub {
            font-size: 12px;
            color: #aaa;
            letter-spacing: 0.03em;
            margin-top: 2px;
            display: block;
        }

        .form-gruppe {
            margin-bottom: 18px;
        }

        .form-gruppe label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-gruppe input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-gruppe input:focus {
            outline: none;
            border-color: var(--navy);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.12);
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: var(--navy);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 8px;
            letter-spacing: 0.01em;
        }

        .btn-login:hover {
            background: var(--navy-mid);
        }

        .fehler {
            background: #fde8ea;
            color: #842029;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="login-logo">
        <img src="/media/logo/NuvioLogo.png" alt="Nuvio" onerror="this.style.display='none'">
        <span class="name">Nuvio</span>
        <span class="sub">Freiberufler-Edition</span>
    </div>

    {% if form.errors %}
    <div class="fehler">
        Benutzername oder Passwort ist falsch.
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <!-- Honeypot-Felder: täuschen den Browser-Autofill -->
        <input type="text" name="fake_user" style="display:none">
        <input type="password" name="fake_pass" style="display:none">

        <div class="form-gruppe">
            <label for="id_username">Benutzername</label>
            <input type="text" name="username" id="id_username" autofocus
                   autocomplete="new-password" readonly
                   onfocus="this.removeAttribute('readonly')">
        </div>

        <div class="form-gruppe">
            <label for="id_password">Passwort</label>
            <input type="password" name="password" id="id_password"
                   autocomplete="new-password" readonly
                   onfocus="this.removeAttribute('readonly')">
        </div>

        <button type="submit" class="btn-login">Anmelden</button>
    </form>
</div>

</body>
</html>
